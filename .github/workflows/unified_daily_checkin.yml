name: Unified Daily Checkin

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    # 设置在每天的 UTC 时间 22:00 运行 (对应中国时区 Asia/Shanghai 上午6点)
    - cron: '0 22 * * *'

# 设置工作流权限，允许创建Release
permissions:
  contents: write  # 创建Release需要此权限
  actions: read    # 读取Actions状态

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      # 设置时区为中国时区
      TZ: Asia/Shanghai
    strategy:
      # 使用矩阵策略并行执行多个签到任务
      matrix:
        include:
          - name: "DoingFB"
            script: "checkin_doingfb.py"
            cookie_secret: "COOKIE_DOINGFB"
            dependencies: "requests beautifulsoup4"
          - name: "Enshan"
            script: "checkin_enshan.py"
            cookie_secret: "COOKIE_ENSHAN"
            dependencies: "curl_cffi[requests]"
          - name: "Hostloc"
            script: "checkin_hostloc.py"
            cookie_secret: "COOKIE_HOSTLOC"
            dependencies: "curl_cffi[requests]"
      # 允许部分任务失败，不影响其他任务
      fail-fast: false
      # 限制并发数量，避免对目标网站造成过大压力
      max-parallel: 2

    name: ${{ matrix.name }} Checkin
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          # 启用缓存以提高性能
          cache: 'pip'

      - name: Install dependencies for ${{ matrix.name }}
        run: |
          python -m pip install --upgrade pip
          pip install ${{ matrix.dependencies }}

      - name: Run ${{ matrix.name }} checkin script with logging
        env:
          # 直接设置对应的环境变量（避免 shell 变量替换问题）
          COOKIE_DOINGFB: ${{ matrix.cookie_secret == 'COOKIE_DOINGFB' && secrets.COOKIE_DOINGFB || '' }}
          COOKIE_ENSHAN: ${{ matrix.cookie_secret == 'COOKIE_ENSHAN' && secrets.COOKIE_ENSHAN || '' }}
          COOKIE_HOSTLOC: ${{ matrix.cookie_secret == 'COOKIE_HOSTLOC' && secrets.COOKIE_HOSTLOC || '' }}
        run: |
          # 创建日志文件名（格式：任务名-日期.log，使用中国时区日期）
          LOG_FILE="${{ matrix.name }}-$(date +%Y%m%d).log"
          
          # 添加日志头部信息
          echo "=== ${{ matrix.name }} 签到任务日志 ===" > "$LOG_FILE"
          echo "执行时间: $(date '+%Y-%m-%d %H:%M:%S %Z') (中国时区)" >> "$LOG_FILE"
          echo "任务脚本: ${{ matrix.script }}" >> "$LOG_FILE"
          echo "========================================" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"
          
          # 使用 tee 命令同时输出到控制台和日志文件
          python ${{ matrix.script }} 2>&1 | tee -a "$LOG_FILE"
          
          # 记录任务完成时间和退出状态
          EXIT_CODE=${PIPESTATUS[0]}
          echo "" >> "$LOG_FILE"
          echo "========================================" >> "$LOG_FILE"
          echo "任务完成时间: $(date '+%Y-%m-%d %H:%M:%S %Z') (中国时区)" >> "$LOG_FILE"
          echo "退出状态码: $EXIT_CODE" >> "$LOG_FILE"
          
          # 如果脚本执行失败，退出并保持错误状态
          exit $EXIT_CODE
        continue-on-error: true

      - name: Upload task logs
        # 无论任务成功或失败都上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-logs
          path: ${{ matrix.name }}-*.log
          retention-days: 30
          if-no-files-found: warn

  # 汇总任务状态并创建Release
  summary:
    needs: checkin
    runs-on: ubuntu-latest
    env:
      # 设置时区为中国时区
      TZ: Asia/Shanghai
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: logs
          merge-multiple: true
        continue-on-error: true

      - name: Debug artifacts and logs
        run: |
          echo "=== 调试信息：检查下载的artifacts和日志文件 ==="
          
          # 检查当前工作目录
          echo "📁 当前工作目录: $(pwd)"
          echo "📋 工作目录内容:"
          ls -la
          
          # 检查logs目录
          if [ -d "logs" ]; then
            echo "✅ logs目录存在"
            echo "📋 logs目录内容:"
            find logs -type f -name "*.log" | head -20
            echo "📊 logs目录统计:"
            echo "  - 总文件数: $(find logs -type f | wc -l)"
            echo "  - 日志文件数: $(find logs -name "*.log" | wc -l)"
          else
            echo "❌ logs目录不存在"
          fi
          
          # 检查是否有任何.log文件
          echo "🔍 搜索所有.log文件:"
          find . -name "*.log" -type f 2>/dev/null || echo "未找到任何.log文件"
          
          echo "=== 调试信息结束 ==="

      - name: Additional debugging information
        run: |
          echo "=== 额外调试信息 ==="
          echo "当前工作目录: $(pwd)"
          echo "环境变量 GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Checkin任务结果: ${{ needs.checkin.result }}"
          echo ""
          echo "=== 查找所有可能的日志文件 ==="
          find . -name "*.log" -type f -exec ls -la {} \; 2>/dev/null || echo "未找到任何.log文件"
          echo ""
          echo "=== 检查是否有任何artifacts相关文件 ==="
          find . -name "*artifact*" -o -name "*log*" 2>/dev/null || echo "未找到artifacts相关文件"
          echo ""
          echo "=== 检查GitHub Actions运行器信息 ==="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "GitHub Event: $GITHUB_EVENT_NAME"
          
      - name: Create logs summary and package
        run: |
          # 创建日志汇总目录
          mkdir -p checkin-logs
          
          # 设置日期变量（使用中国时区）
          DATE=$(date +%Y%m%d)
          DATETIME=$(date '+%Y-%m-%d %H:%M:%S %Z')
          
          # 创建简洁的Release描述文件
          RELEASE_SUMMARY="release-summary.md"
          echo "## 📅 签到任务执行摘要 - $DATE" > "$RELEASE_SUMMARY"
          echo "" >> "$RELEASE_SUMMARY"
          echo "**🕒 执行时间:** $DATETIME (中国时区)" >> "$RELEASE_SUMMARY"
          echo "" >> "$RELEASE_SUMMARY"
          
          # 初始化计数器
          TOTAL_TASKS=0
          SUCCESS_TASKS=0
          FOUND_LOGS=false
          
          echo "### 📊 任务执行结果" >> "$RELEASE_SUMMARY"
          echo "" >> "$RELEASE_SUMMARY"
          
          # 检查并处理日志文件
          if [ -d "logs" ]; then
            echo "🔍 正在处理logs目录中的文件..."
            
            # 使用数组来避免子shell问题
            log_files=()
            while IFS= read -r -d '' file; do
              log_files+=("$file")
            done < <(find logs -name "*.log" -type f -print0 2>/dev/null)
            
            if [ ${#log_files[@]} -gt 0 ]; then
              FOUND_LOGS=true
              echo "✅ 找到 ${#log_files[@]} 个日志文件"
              
              for log_file in "${log_files[@]}"; do
                if [ -f "$log_file" ]; then
                  cp "$log_file" checkin-logs/
                  filename=$(basename "$log_file")
                  task_name=$(echo "$filename" | cut -d'-' -f1)
                  
                  echo "📝 处理日志文件: $filename (任务: $task_name)"
                  
                  # 检查日志中的退出状态码
                  if grep -q "退出状态码: 0" "$log_file"; then
                    status="✅ 成功"
                    SUCCESS_TASKS=$((SUCCESS_TASKS + 1))
                  else
                    status="❌ 失败"
                  fi
                  
                  # 提取关键结果信息
                  result_info=""
                  case "$task_name" in
                    "DoingFB")
                      if grep -q "当前金币:" "$log_file"; then
                        coins=$(grep "当前金币:" "$log_file" | tail -1 | sed 's/.*当前金币: *//')
                        result_info="💰 金币: $coins"
                      elif grep -q "已经签到过了" "$log_file"; then
                        days=$(grep -o "已连续签到 [0-9]* 天" "$log_file" | grep -o "[0-9]*" | head -1)
                        result_info="📅 已连续签到 $days 天"
                      fi
                      ;;
                    "Enshan")
                      if grep -q "恩山币:" "$log_file"; then
                        coins=$(grep "恩山币:" "$log_file" | tail -1 | sed 's/.*恩山币: *//')
                        result_info="🪙 恩山币: $coins"
                      fi
                      ;;
                    "Hostloc")
                      if grep -q "金钱:" "$log_file" && grep -q "积分:" "$log_file"; then
                        money=$(grep "金钱:" "$log_file" | tail -1 | sed 's/.*金钱: *//')
                        points=$(grep "积分:" "$log_file" | tail -1 | sed 's/.*积分: *//')
                        result_info="💎 金钱: $money | 🏆 积分: $points"
                      fi
                      ;;
                  esac
                  
                  # 写入摘要
                  echo "**$task_name:** $status" >> "$RELEASE_SUMMARY"
                  if [ -n "$result_info" ]; then
                    echo "  - $result_info" >> "$RELEASE_SUMMARY"
                  fi
                  echo "" >> "$RELEASE_SUMMARY"
                  
                  TOTAL_TASKS=$((TOTAL_TASKS + 1))
                fi
              done
            else
              echo "⚠️ logs目录存在但未找到.log文件"
            fi
          else
            echo "❌ logs目录不存在"
          fi
          
          # 添加统计信息
          echo "### 📈 执行统计" >> "$RELEASE_SUMMARY"
          echo "" >> "$RELEASE_SUMMARY"
          
          if [ "$FOUND_LOGS" = true ] && [ $TOTAL_TASKS -gt 0 ]; then
            success_rate=$(( SUCCESS_TASKS * 100 / TOTAL_TASKS ))
            echo "- 📋 **总任务数:** $TOTAL_TASKS" >> "$RELEASE_SUMMARY"
            echo "- ✅ **成功任务:** $SUCCESS_TASKS" >> "$RELEASE_SUMMARY"
            echo "- ❌ **失败任务:** $((TOTAL_TASKS - SUCCESS_TASKS))" >> "$RELEASE_SUMMARY"
            echo "- 📊 **成功率:** ${success_rate}%" >> "$RELEASE_SUMMARY"
          else
            echo "- ⚠️ **状态:** 未找到任务执行记录" >> "$RELEASE_SUMMARY"
            echo "- 🔍 **可能原因:**" >> "$RELEASE_SUMMARY"
            echo "  - 签到任务执行失败" >> "$RELEASE_SUMMARY"
            echo "  - 日志文件上传失败" >> "$RELEASE_SUMMARY"
            echo "  - Artifacts下载失败" >> "$RELEASE_SUMMARY"
            echo "- 🛠️ **建议操作:**" >> "$RELEASE_SUMMARY"
            echo "  - 检查GitHub Actions执行日志" >> "$RELEASE_SUMMARY"
            echo "  - 验证Cookie配置是否正确" >> "$RELEASE_SUMMARY"
            echo "  - 检查网络连接状态" >> "$RELEASE_SUMMARY"
            
            # 添加checkin任务的执行状态信息
            echo "" >> "$RELEASE_SUMMARY"
            echo "### 🔧 调试信息" >> "$RELEASE_SUMMARY"
            echo "- **Checkin任务状态:** ${{ needs.checkin.result }}" >> "$RELEASE_SUMMARY"
            echo "- **Summary执行时间:** $DATETIME (中国时区)" >> "$RELEASE_SUMMARY"
          fi
          
          echo "" >> "$RELEASE_SUMMARY"
          echo "---" >> "$RELEASE_SUMMARY"
          
          if [ "$FOUND_LOGS" = true ]; then
            echo "📦 **完整日志:** 请下载附件中的日志压缩包查看详细执行过程" >> "$RELEASE_SUMMARY"
          else
            echo "📋 **说明:** 本次执行未生成日志文件，请检查上述可能原因" >> "$RELEASE_SUMMARY"
          fi
          
          # 创建日志压缩包（即使没有日志文件也创建，包含调试信息）
          ARCHIVE_NAME="checkin-logs-${DATE}.tar.gz"
          
          # 如果没有找到日志，创建一个调试信息文件
          if [ "$FOUND_LOGS" = false ]; then
            echo "=== 调试信息 ===" > "checkin-logs/debug-info.txt"
            echo "执行时间: $DATETIME (中国时区)" >> "checkin-logs/debug-info.txt"
            echo "Checkin任务状态: ${{ needs.checkin.result }}" >> "checkin-logs/debug-info.txt"
            echo "工作目录内容:" >> "checkin-logs/debug-info.txt"
            ls -la >> "checkin-logs/debug-info.txt" 2>&1
            echo "" >> "checkin-logs/debug-info.txt"
            echo "搜索日志文件结果:" >> "checkin-logs/debug-info.txt"
            find . -name "*.log" -type f >> "checkin-logs/debug-info.txt" 2>&1 || echo "未找到任何.log文件" >> "checkin-logs/debug-info.txt"
          fi
          
          tar -czf "$ARCHIVE_NAME" -C checkin-logs .
          
          echo "LOG_ARCHIVE=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "LOG_DATE=$DATE" >> $GITHUB_ENV
          echo "RELEASE_SUMMARY=$RELEASE_SUMMARY" >> $GITHUB_ENV
          echo "FOUND_LOGS=$FOUND_LOGS" >> $GITHUB_ENV

      - name: Check overall status
        run: |
          echo "=== 签到任务执行完成 ==="
          echo "详细结果请查看日志文件和Release"
          
          # 检查是否有任务失败
          if [[ "${{ needs.checkin.result }}" == "failure" ]]; then
            echo "⚠️ 部分签到任务可能失败，请检查具体日志"
          else
            echo "✅ 所有签到任务执行完成"
          fi
          
          # 显示日志文件信息
          if [ -f "$LOG_ARCHIVE" ]; then
            echo "📦 日志压缩包: $LOG_ARCHIVE"
            echo "📊 压缩包大小: $(du -h "$LOG_ARCHIVE" | cut -f1)"
          fi

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: checkin-logs-${{ env.LOG_DATE }}
          name: 签到日志 - ${{ env.LOG_DATE }}
          body_path: ${{ env.RELEASE_SUMMARY }}
          files: ${{ env.LOG_ARCHIVE }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
        continue-on-error: true
        
      - name: Release creation status
        run: |
          if [ "${{ steps.create-release.outcome }}" = "success" ]; then
            echo "✅ Release创建成功"
            echo "📦 Release标签: checkin-logs-${{ env.LOG_DATE }}"
            echo "🔗 可在GitHub Releases页面查看详细信息"
          else
            echo "❌ Release创建失败"
            echo "🔍 请检查GitHub Actions日志获取详细错误信息"
            echo "📋 日志文件状态: ${{ env.FOUND_LOGS }}"
            echo "📁 日志压缩包: ${{ env.LOG_ARCHIVE }}"
          fi